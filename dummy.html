<!DOCTYPE html>
<html>
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<style>
body{
display:flex;
flex-wrap:wrap;
width:200px;
margin:100px auto;
}

.dot{
width:15px;
height:15px;
background:black;
margin:5px;
border-radius:50%;
}
</style>

</head>

<body>

<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>

<script>

const options = {
grid:[3,3],
from:'center'
};

anime.timeline()
.add('.dot',{
scale:anime.stagger([1.5,.5],options),
easing:'easeInOutQuad',
delay:anime.stagger(200,options)
});

</script>

</body>
</html>
